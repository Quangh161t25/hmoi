<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phiếu Theo Dõi Nhiệt Độ Tủ Lạnh 2-8°C - Bệnh Viện Nhi Đồng 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            @page {
                size: A4 landscape;
                margin: 5mm;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                margin: 0;
                padding: 0;
                background: transparent;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                overflow: hidden;
            }

            .no-print {
                display: none !important;
            }

            .page-break {
                page-break-before: always;
                break-before: page;
            }

            #print-container {
                max-width: none !important;
                margin: 0 !important;
                width: 100% !important;
            }

            section {
                box-shadow: none !important;
                margin: 0 0 4mm 0 !important;
                padding: 0 !important;
                width: 100% !important;
                max-width: none !important;
                transform: none !important;
                break-inside: avoid;
                page-break-inside: avoid;
            }

            .chart-wrap {
                width: 100% !important;
                overflow: hidden !important;
            }

            table {
                width: 100% !important;
                table-layout: fixed !important;
            }

            th,
            td {
                font-size: 7px;
                height: 14px;
                padding: 0;
                line-height: 1;
                overflow: hidden;
                white-space: nowrap;
            }

            .header-title {
                font-size: 12px;
                margin: 2px 0 4px;
                line-height: 1.15;
            }

            .grid {
                gap: 0.15rem;
                margin-bottom: 0.2rem;
            }

            .mark {
                font-size: 11px;
            }

            .td-name {
                font-size: 6px;
                line-height: 1;
            }

            .chart-svg {
                width: 100% !important;
                height: 100% !important;
            }
        }

        table {
            border-collapse: collapse;
            width: 100%;
            table-layout: fixed;
        }

        th,
        td {
            border: 1px solid #333;
            padding: 2px;
            text-align: center;
            font-size: 11px;
            height: 26px;
            vertical-align: middle;
        }

        .header-title {
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            margin: 10px 0;
            text-transform: uppercase;
        }

        .td-name {
            font-size: 9px;
            line-height: 1.1;
            word-break: break-all;
        }

        .mark {
            font-weight: bold;
            font-size: 18px;
            line-height: 1;
            display: inline-block;
            transform: translateY(1px);
        }

        .dot-cell {
            position: relative;
        }

        .dot-cell.has-point::before {
            content: '.';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-size: 12px;
            font-weight: 700;
            color: #2563eb;
            line-height: 1;
            z-index: 2;
            pointer-events: none;
        }

        .chart-wrap {
            position: relative;
            width: 100%;
            overflow: hidden;
        }

        .chart-svg {
            position: absolute;
            left: 0;
            top: 0;
            width: 0;
            height: 0;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>

<body class="bg-gray-100 p-2 font-sans text-xs">

    <div class="max-w-5xl mx-auto space-y-12" id="print-container">
        <!-- JS sẽ inject HTML vào đây -->
    </div>

    <div class="no-print fixed bottom-4 right-4 flex gap-4">
        <button onclick="printWithAlignedOverlay()"
            class="bg-blue-600 text-white px-6 py-2 rounded-full shadow-lg hover:bg-blue-700 transition font-bold">
            🖨️ In Phiếu
        </button>
    </div>

    <script>
        // Lấy dữ liệu từ URL truyền vào (vd: ?thang=03/2026&data=1S3_ADMIN|... hoặc ?1S3_ADMIN|...)
        const urlParams = new URLSearchParams(window.location.search);
        let rawData = urlParams.get('data');
        let thangNam = urlParams.get('thang');

        // Nếu không dùng tham số data=, lấy thẳng từ chuỗi query
        if (!rawData && window.location.search.length > 1 && !window.location.search.includes('=')) {
            rawData = decodeURIComponent(window.location.search.substring(1));
        }

        // Mặc định chuỗi rỗng nếu không có link truyền vào
        rawData = rawData || "";
        thangNam = thangNam || "...../2026";

        // Hàm phân tích dữ liệu
        const items = rawData.split('|');
        const dataMap = {};

        items.forEach(item => {
            if (!item) return;
            // Pattern: [Ngày][S/C][Nhiệt độ]_[Người ký] (vd: 1S3_ADMIN)
            const match = item.match(/^(\d+)([SC])([^_]+)_(.+)$/i);
            if (match) {
                const day = parseInt(match[1]);
                const session = match[2].toUpperCase(); // S hoặc C
                const temp = match[3];
                const admin = match[4];

                if (!dataMap[day]) dataMap[day] = {};
                dataMap[day][session] = { temp, admin };
            }
        });

        // Thiết lập 2 trang (Trang 1: 1-15, Trang 2: 16-31)
        const pages = [
            { start: 1, end: 15 },
            { start: 16, end: 31 }
        ];

        let htmlContent = '';

        pages.forEach((page, pageIndex) => {
            // Kiểm tra xem trang có dữ liệu không
            let hasData = false;
            for (let d = page.start; d <= page.end; d++) {
                if (dataMap[d]) hasData = true;
            }
            if (pageIndex > 0 && !hasData) return; // Bỏ qua trang 2 nếu không có dữ liệu

            const orderedKeys = [];
            for (let d = page.start; d <= page.end; d++) {
                const morning = dataMap[d] && dataMap[d]['S'] ? parseInt(dataMap[d]['S'].temp) : null;
                const afternoon = dataMap[d] && dataMap[d]['C'] ? parseInt(dataMap[d]['C'].temp) : null;
                if (morning !== null && !isNaN(morning)) orderedKeys.push(`d${d}-S`);
                if (afternoon !== null && !isNaN(afternoon)) orderedKeys.push(`d${d}-C`);
            }

            htmlContent += `
            <section class="bg-white p-3 shadow-lg rounded-lg border border-gray-200 ${pageIndex > 0 ? 'page-break' : ''}">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h3 class="font-bold">Bệnh viện Nhi Đồng 1</h3>
                        <p class="text-sm">Ban QLCLXN</p>
                        <p class="text-sm font-semibold">Khoa Xét nghiệm Huyết Học</p>
                    </div>
                    <div class="text-right text-xs">
                        <p></p>
                        <p></p>
                    </div>
                </div>

                <h1 class="header-title">PHIẾU THEO DÕI NHIỆT ĐỘ TỦ LẠNH TRỮ HÓA CHẤT 2-8°C <br><span class="text-sm font-normal">(Trang ${pageIndex + 1})</span></h1>

                <div class="grid grid-cols-2 gap-4 mb-4 text-sm">
                    <p><strong>Loại tủ:</strong> SANYO MAR 304</p>
                    <p><strong>Mã thiết bị:</strong> Hem...008</p>
                    <p><strong>Mã nhiệt kế:</strong> -010</p>
                    <p><strong>Tháng/Năm:</strong> ${thangNam}</p>
                </div>

                <div class="chart-wrap" style="width: 100%;">
                    <svg class="chart-svg" preserveAspectRatio="none"></svg>
                    <table>
                        <thead>
                            <tr class="bg-gray-100">
                                <th rowspan="2" class="w-16">Nhiệt độ</th>
                                <th colspan="${(page.end - page.start + 1) * 2}" class="font-bold">Ngày trong tháng (${page.start} - ${page.end})</th>
                            </tr>
                            <tr class="bg-gray-100">`;

            for (let d = page.start; d <= page.end; d++) {
                htmlContent += `<th colspan="2" class="w-12">${d}</th>`;
            }

            htmlContent += `
                        </tr>
                        <tr class="bg-gray-100">
                            <th>Buổi</th>`;

            for (let d = page.start; d <= page.end; d++) {
                htmlContent += `<th>S</th><th>C</th>`;
            }

            htmlContent += `
                        </tr>
                    </thead>
                    <tbody>`;

            // Sinh các dòng nhiệt độ từ 8°C đến 2°C
            for (let temp = 8; temp >= 2; temp--) {
                // Kiểm tra xem dòng này có rơi nguy hiểm không (nhiệt độ >=8 hoặc <=2)
                let tempClass = (temp === 8 || temp === 2) ? 'text-red-600 font-bold' : 'font-bold';
                htmlContent += `<tr><td class="${tempClass}">${temp}°C</td>`;

                for (let d = page.start; d <= page.end; d++) {
                    const morningTemp = dataMap[d] && dataMap[d]['S'] ? parseInt(dataMap[d]['S'].temp) : null;
                    const afternoonTemp = dataMap[d] && dataMap[d]['C'] ? parseInt(dataMap[d]['C'].temp) : null;

                    const mActive = morningTemp === temp;
                    const aActive = afternoonTemp === temp;

                    const mClasses = ['dot-cell'];
                    const aClasses = ['dot-cell'];
                    if (mActive) mClasses.push('has-point');
                    if (aActive) aClasses.push('has-point');

                    const mKey = mActive ? `data-key="d${d}-S"` : '';
                    const aKey = aActive ? `data-key="d${d}-C"` : '';

                    htmlContent += `<td class="${mClasses.join(' ')}" ${mKey}></td><td class="${aClasses.join(' ')}" ${aKey}></td>`;
                }
                htmlContent += `</tr>`;
            }

            // Dòng chữ ký (Ký tên)
            htmlContent += `
                        <tr>
                            <td class="font-bold bg-gray-50">Ký tên</td>`;
            for (let d = page.start; d <= page.end; d++) {
                let m_admin = (dataMap[d] && dataMap[d]['S'] && dataMap[d]['S'].admin) ? dataMap[d]['S'].admin : '';
                let a_admin = (dataMap[d] && dataMap[d]['C'] && dataMap[d]['C'].admin) ? dataMap[d]['C'].admin : '';

                htmlContent += `<td class="td-name text-blue-800 font-medium">${m_admin}</td><td class="td-name text-blue-800 font-medium">${a_admin}</td>`;
            }

            htmlContent += `
                        </tr>
                    </tbody>
                </table>
                <p class="mt-4 text-xs italic text-gray-700">* Ghi chú: S = Sáng (8:00), C = Chiều (16:00). Đánh dấu 'v' vào ô nhiệt độ đo được.</p>
            </section>`;
        });

        document.getElementById('print-container').innerHTML = htmlContent;

        function drawOverlayLines() {
            const sections = document.querySelectorAll('#print-container section');

            sections.forEach((section, sectionIndex) => {
                const page = pages[sectionIndex];
                if (!page) return;

                const wrap = section.querySelector('.chart-wrap');
                const table = section.querySelector('table');
                const svg = section.querySelector('.chart-svg');
                if (!wrap || !table || !svg) return;

                const wrapRect = wrap.getBoundingClientRect();
                const width = wrapRect.width;
                const height = wrapRect.height;

                svg.style.left = '0px';
                svg.style.top = '0px';
                svg.style.width = `${width}px`;
                svg.style.height = `${height}px`;
                svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
                svg.setAttribute('preserveAspectRatio', 'none');

                const points = [];
                for (let d = page.start; d <= page.end; d++) {
                    const morningCell = section.querySelector(`[data-key="d${d}-S"]`);
                    const afternoonCell = section.querySelector(`[data-key="d${d}-C"]`);

                    if (morningCell) {
                        const r = morningCell.getBoundingClientRect();
                        points.push({ x: (r.left - wrapRect.left) + (r.width / 2), y: (r.top - wrapRect.top) + (r.height / 2) });
                    }
                    if (afternoonCell) {
                        const r = afternoonCell.getBoundingClientRect();
                        points.push({ x: (r.left - wrapRect.left) + (r.width / 2), y: (r.top - wrapRect.top) + (r.height / 2) });
                    }
                }

                svg.innerHTML = '';
                if (points.length < 2) return;

                const ns = 'http://www.w3.org/2000/svg';
                const polyline = document.createElementNS(ns, 'polyline');
                polyline.setAttribute('fill', 'none');
                polyline.setAttribute('stroke', '#dc2626');
                polyline.setAttribute('stroke-width', '1.8');
                polyline.setAttribute('stroke-linecap', 'round');
                polyline.setAttribute('stroke-linejoin', 'round');
                polyline.setAttribute('vector-effect', 'non-scaling-stroke');
                polyline.setAttribute('points', points.map(p => `${p.x},${p.y}`).join(' '));
                svg.appendChild(polyline);

                points.forEach(p => {
                    const circle = document.createElementNS(ns, 'circle');
                    circle.setAttribute('cx', p.x);
                    circle.setAttribute('cy', p.y);
                    circle.setAttribute('r', '2.2');
                    circle.setAttribute('fill', '#dc2626');
                    circle.setAttribute('stroke', '#ffffff');
                    circle.setAttribute('stroke-width', '1');
                    circle.setAttribute('vector-effect', 'non-scaling-stroke');
                    svg.appendChild(circle);
                });
            });
        }

        function tagDataCells() {
            const sections = document.querySelectorAll('#print-container section');
            sections.forEach((section, sectionIndex) => {
                const page = pages[sectionIndex];
                if (!page) return;

                const rows = section.querySelectorAll('tbody tr');
                const tempRows = Array.from(rows).slice(0, 7); // 8°C -> 2°C

                tempRows.forEach((tr, idx) => {
                    const temp = 8 - idx;
                    const tds = tr.querySelectorAll('td');
                    for (let d = page.start; d <= page.end; d++) {
                        const base = 1 + ((d - page.start) * 2);
                        const mCell = tds[base];
                        const cCell = tds[base + 1];

                        const mTemp = dataMap[d] && dataMap[d]['S'] ? parseInt(dataMap[d]['S'].temp) : null;
                        const cTemp = dataMap[d] && dataMap[d]['C'] ? parseInt(dataMap[d]['C'].temp) : null;

                        if (mCell && mTemp === temp) mCell.setAttribute('data-key', `d${d}-S`);
                        if (cCell && cTemp === temp) cCell.setAttribute('data-key', `d${d}-C`);
                    }
                });
            });
        }

        function redrawAll() {
            tagDataCells();
            drawOverlayLines();
        }

        function printWithAlignedOverlay() {
            redrawAll();
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    window.print();
                });
            });
        }

        redrawAll();
        window.addEventListener('resize', redrawAll);
        window.addEventListener('beforeprint', redrawAll);

    </script>
</body>

</html>
