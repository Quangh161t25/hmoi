<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Hoa Trong Ngày - Khang Thành Flower</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #666666;
            --accent-color: #000000;
            --border-color: #dddddd;
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f4f4f4;
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        /* Print Button */
        .no-print-zone {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        #print-btn {
            background: #000;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            font-size: 14px;
            text-transform: uppercase;
        }

        /* Page styling */
        .page {
            width: 210mm;
            min-height: 297mm;
            padding: 15mm;
            margin: 20px auto;
            background: white;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            position: relative;
            page-break-after: always;
        }

        @media print {
            body {
                background: white;
            }

            .no-print-zone {
                display: none !important;
            }

            .page {
                margin: 0;
                box-shadow: none;
                width: 100%;
                min-height: initial;
            }
        }

        /* Header Date */
        .date-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .date-label {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--text-main);
            border-bottom: 2px solid var(--accent-color);
            display: inline-block;
            padding-bottom: 5px;
        }

        /* Two Column Layout */
        .dual-table-container {
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }

        .table-half {
            width: calc(50% - 10px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            background-color: #f9f9f9;
            text-align: left;
            padding: 8px;
            border: 1px solid var(--border-color);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 8px;
            border: 1px solid var(--border-color);
            vertical-align: middle;
        }

        .col-stt {
            width: 35px;
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
        }

        .col-ten {
            font-weight: 500;
        }

        .col-sl {
            width: 50px;
            text-align: center;
            font-weight: 700;
            font-size: 15px;
        }

        .empty-row {
            height: 38px;
        }

        .empty-state {
            text-align: center;
            padding-top: 100px;
            font-style: italic;
            color: gray;
        }
    </style>
</head>

<body>
    <div class="no-print-zone">
        <button id="print-btn" onclick="window.print()">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
            </svg>
            In PDF
        </button>
    </div>

    <div id="main-content">
        <!-- Pages will be injected here -->
    </div>

    <script>
        function parseAndRender() {
            const urlParams = new URLSearchParams(window.location.search);
            let rawData = urlParams.get('data');

            if (!rawData && window.location.search) {
                rawData = decodeURIComponent(window.location.search.substring(1));
            }

            if (!rawData) {
                document.getElementById('main-content').innerHTML = '<div class="page"><div class="empty-state">Dữ liệu trống</div></div>';
                return;
            }

            try {
                const cleanedData = rawData.trim().replace(/\.$/, '');
                const parts = cleanedData.split('&');
                if (parts.length < 2) throw new Error("Sai định dạng");

                const dateStr = parts[0].trim();
                const itemsRaw = parts[1].trim();
                const items = itemsRaw.split(',').map(item => {
                    const [name, qty] = item.split('|');
                    return { name: (name || '').trim(), qty: (qty || '0').trim() };
                }).filter(item => item.name.length > 0);

                const ROWS_PER_PAGE = 25;
                const ITEMS_PER_PAGE = ROWS_PER_PAGE * 2; // 50 items per page

                const mainContent = document.getElementById('main-content');
                mainContent.innerHTML = '';

                for (let i = 0; i < items.length; i += ITEMS_PER_PAGE) {
                    const pageItems = items.slice(i, i + ITEMS_PER_PAGE);
                    const leftColItems = pageItems.slice(0, ROWS_PER_PAGE);
                    const rightColItems = pageItems.slice(ROWS_PER_PAGE, ITEMS_PER_PAGE);

                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'page';

                    let tableRowsHtml = '';
                    for (let r = 0; r < ROWS_PER_PAGE; r++) {
                        const left = leftColItems[r];
                        const right = rightColItems[r];

                        const leftHtml = left
                            ? `<td class="col-stt">${i + r + 1}</td><td class="col-ten">${left.name}</td><td class="col-sl">${left.qty}</td>`
                            : `<td class="col-stt"></td><td class="col-ten"></td><td class="col-sl"></td>`;

                        const rightHtml = right
                            ? `<td class="col-stt">${i + ROWS_PER_PAGE + r + 1}</td><td class="col-ten">${right.name}</td><td class="col-sl">${right.qty}</td>`
                            : `<td class="col-stt"></td><td class="col-ten"></td><td class="col-sl"></td>`;

                        tableRowsHtml += `<tr>${leftHtml}<td style="border:none; width:20px;"></td>${rightHtml}</tr>`;
                    }

                    pageDiv.innerHTML = `
                        <div class="date-container">
                            <div class="date-label">${dateStr}</div>
                        </div>
                        <div class="dual-table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th class="col-stt">STT</th><th class="col-ten">Tên Hoa</th><th class="col-sl">SL</th>
                                        <th style="border:none; background:white; width:20px;"></th>
                                        <th class="col-stt">STT</th><th class="col-ten">Tên Hoa</th><th class="col-sl">SL</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${tableRowsHtml}
                                </tbody>
                            </table>
                        </div>
                    `;
                    mainContent.appendChild(pageDiv);
                }

            } catch (e) {
                console.error(e);
                document.getElementById('main-content').innerHTML = '<div class="page"><div class="empty-state">Lỗi dữ liệu</div></div>';
            }
        }

        window.addEventListener('DOMContentLoaded', parseAndRender);
    </script>
</body>

</html>
