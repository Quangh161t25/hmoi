<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Hoa Trong Ngày - Khang Thành Flower</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #666666;
            --accent-color: #000000;
            --border-color: #000000;
            /* Đổi sang màu đen rõ hơn để dễ nhìn khi in */
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f0f0f0;
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        .no-print-zone {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        #print-btn {
            background: #000;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        /* Định dạng khổ giấy A4 */
        .page {
            width: 210mm;
            height: 297mm;
            /* Cố định chiều cao trang để không bị tràn */
            padding: 15mm;
            margin: 10px auto;
            background: white;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            page-break-after: always;
        }

        @media print {
            body {
                background: white;
            }

            .no-print-zone {
                display: none !important;
            }

            .page {
                margin: 0;
                box-shadow: none;
                width: 210mm;
                height: 297mm;
            }
        }

        .dual-table-container {
            display: flex;
            justify-content: space-between;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            /* Cố định chiều rộng cột */
        }

        th,
        td {
            border: 1px solid var(--border-color);
            padding: 5px;
            vertical-align: middle;
            height: 48px;
            /* Cố định chiều cao hàng để chống lệch dòng */
            overflow: hidden;
            text-overflow: ellipsis;
        }

        th {
            background-color: #f2f2f2;
            font-size: 13px;
            height: 40px;
        }

        .col-stt {
            width: 45px;
            text-align: center;
        }

        .col-ten {
            text-align: left;
            font-weight: 500;
            font-size: 14px;
            padding-left: 10px;
        }

        .col-sl {
            width: 60px;
            text-align: center;
            font-weight: 700;
            font-size: 18px;
        }

        .spacer {
            border: none !important;
            width: 60px;
        }

        .empty-state {
            text-align: center;
            margin-top: 100px;
            color: #999;
        }
    </style>
</head>

<body>
    <div class="no-print-zone">
        <button id="print-btn" onclick="window.print()">In PDF</button>
    </div>

    <div id="main-content">
        <!-- JS sẽ chèn các trang vào đây -->
    </div>

    <script>
        function parseAndRender() {
            const urlParams = new URLSearchParams(window.location.search);
            let rawData = urlParams.get('data');
            if (!rawData && window.location.search) {
                rawData = decodeURIComponent(window.location.search.substring(1));
            }

            if (!rawData) {
                document.getElementById('main-content').innerHTML = '<div class="page"><div class="empty-state">Dữ liệu trống</div></div>';
                return;
            }

            try {
                const cleanedData = rawData.trim().replace(/\.$/, '');
                const parts = cleanedData.split('&');
                const itemsRaw = parts.length > 1 ? parts[1].trim() : parts[0].trim();

                const items = itemsRaw.split(',').map(item => {
                    const [name, qty] = item.split('|');
                    const cleanQty = (qty || '0').trim();
                    return {
                        name: (name || '').trim(),
                        qty: cleanQty,
                        qtyNumber: parseFloat(cleanQty.replace(/\./g, '').replace(/,/g, '.')) || 0
                    };
                }).filter(item => item.name.length > 0);

                // Sắp xếp giảm dần theo số lượng
                items.sort((a, b) => b.qtyNumber - a.qtyNumber);

                const ROWS_PER_PAGE = 20; // Đổi thành 20 dòng
                const ITEMS_PER_PAGE = ROWS_PER_PAGE * 2;

                const mainContent = document.getElementById('main-content');
                mainContent.innerHTML = '';

                for (let i = 0; i < items.length; i += ITEMS_PER_PAGE) {
                    const pageItems = items.slice(i, i + ITEMS_PER_PAGE);
                    const leftColItems = pageItems.slice(0, ROWS_PER_PAGE);
                    const rightColItems = pageItems.slice(ROWS_PER_PAGE, ITEMS_PER_PAGE);

                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'page';

                    let rowsHtml = '';
                    for (let r = 0; r < ROWS_PER_PAGE; r++) {
                        const left = leftColItems[r];
                        const right = rightColItems[r];

                        const leftCell = left
                            ? `<td class="col-stt">${i + r + 1}</td><td class="col-ten">${left.name}</td><td class="col-sl">${left.qty}</td>`
                            : `<td class="col-stt"></td><td class="col-ten"></td><td class="col-sl"></td>`;

                        const rightCell = right
                            ? `<td class="col-stt">${i + ROWS_PER_PAGE + r + 1}</td><td class="col-ten">${right.name}</td><td class="col-sl">${right.qty}</td>`
                            : `<td class="col-stt"></td><td class="col-ten"></td><td class="col-sl"></td>`;

                        rowsHtml += `<tr>${leftCell}<td class="spacer"></td>${rightCell}</tr>`;
                    }

                    pageDiv.innerHTML = `
                        <div class="dual-table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th class="col-stt">STT</th><th class="col-ten">TÊN HOA</th><th class="col-sl">SL</th>
                                        <th class="spacer"></th>
                                        <th class="col-stt">STT</th><th class="col-ten">TÊN HOA</th><th class="col-sl">SL</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${rowsHtml}
                                </tbody>
                            </table>
                        </div>
                    `;
                    mainContent.appendChild(pageDiv);
                }

            } catch (e) {
                document.getElementById('main-content').innerHTML = '<div class="page"><div class="empty-state">Lỗi xử lý dữ liệu</div></div>';
            }
        }

        window.addEventListener('DOMContentLoaded', parseAndRender);
    </script>
</body>

</html>
