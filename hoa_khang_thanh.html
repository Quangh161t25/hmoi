<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hóa Đơn Bán Hàng - Khang Thành Flower</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            .no-print {
                display: none;
            }

            body {
                background-color: white;
            }

            .invoice-container {
                box-shadow: none;
                border: none;
            }
        }

        body {
            font-family: 'Times New Roman', Times, serif;
            background-color: #f3f4f6;
        }

        .invoice-container {
            max-width: 800px;
            margin: 20px auto;
            background: white;
            padding: 40px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th,
        td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }

        .text-right {
            text-align: right;
        }

        .text-center {
            text-align: center;
        }

        .font-bold {
            font-weight: bold;
        }

        .header-title {
            color: #1e3a8a;
            font-size: 24px;
            letter-spacing: 2px;
        }
    </style>
</head>

<body>
    <div class="no-print flex justify-center mt-5">
        <button onclick="window.print()"
            class="bg-blue-600 text-white px-6 py-2 rounded shadow hover:bg-blue-700 transition">
            In Hóa Đơn
        </button>
    </div>
    <div class="invoice-container">
        <!-- Header Section -->
        <div class="flex items-start mb-6 relative">
            <img src="https://i.ibb.co/X1vVPZn/65-A0-B8-B5-1-EA7-43-D4-87-EC-DB2-C237-B4-EC6.png"
                alt="Khang Thành Flower Logo" class="w-32 h-auto absolute top-0 left-0">
            <div class="text-center w-full">
                <h1 class="text-2xl font-bold text-yellow-600 italic">Khang Thành Flower</h1>
                <p class="text-sm">338 Xô Viết Nghệ Tĩnh - Phường Lang Biang - Đà Lạt - Tỉnh Lâm Đồng</p>
                <p class="text-sm">SĐT: 0902.422.102</p>
            </div>
        </div>
        <div class="text-center mb-8">
            <h2 class="header-title font-bold uppercase">Hóa Đơn Bán Hàng</h2>
        </div>
        <!-- Info Section -->
        <div class="mb-6 leading-relaxed" id="info-section">
            <p><span class="font-bold">Ngày:</span> </p>
            <p><span class="font-bold">Khách hàng:</span> </p>
        </div>
        <!-- Table Section -->
        <table class="mb-6">
            <thead class="bg-gray-50">
                <tr class="text-center">
                    <th style="width: 50px;">STT</th>
                    <th>Tên hoa</th>
                    <th style="width: 50px;">SL</th>
                    <th>Đơn giá</th>
                    <th>Thành tiền</th>
                </tr>
            </thead>
            <tbody id="product-table-body">
                <!-- Sản phẩm sẽ được thêm động ở đây -->
            </tbody>
        </table>
        <!-- Footer Summary -->
        <div class="flex justify-between items-end mt-4">
            <div id="qr-container" class="text-center">
                <!-- QR Code will be injected here -->
            </div>
            <div class="w-1/2 text-right leading-loose" id="summary-section">
                <!-- Nội dung tổng cộng sẽ được JavaScript điền vào -->
            </div>
        </div>
        <div class="text-center mt-12 italic">
            <p>Cảm ơn quý khách!</p>
        </div>
    </div>

    <script>
        // Hàm format số tiền với dấu chấm (ví dụ: 1000000 -> 1.000.000 đ)
        function formatVND(amount) {
            return amount.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".") + " đ";
        }

        // Lấy toàn bộ query string (giải mã ký tự đặc biệt)
        const queryString = decodeURIComponent(window.location.search.substring(1));

        // Nếu không có dữ liệu URL, ẩn toàn bộ nội dung và dừng script
        if (!queryString) {
            document.body.innerHTML = "";
            console.log("No data provided");
        } else {
            // Tách các đoạn dữ liệu dựa trên dấu | hoặc ?
            const segments = queryString.split(/[|?]/);

            let ngay = "";
            let khachHang = "";
            let cuocXe = 0;
            let productsRaw = "";
            let daTra = 0;

            segments.forEach(seg => {
                if (seg.startsWith("ngay=")) {
                    ngay = seg.replace("ngay=", "");
                } else if (seg.startsWith("khach_hang=")) {
                    khachHang = seg.replace("khach_hang=", "");
                } else if (seg.startsWith("cuoc=")) {
                    cuocXe = parseInt(seg.replace("cuoc=", "")) || 0;
                } else if (seg.includes("_a_")) {
                    productsRaw = seg;
                }
            });

            // Tách danh sách sản phẩm (_b_ ngăn cách các sp, _a_ ngăn cách chi tiết)
            const products = productsRaw ? productsRaw.split('_b_').map((p, index) => {
                const fields = p.split('_a_');
                const ten = fields[0];
                const gia = parseInt(fields[1]) || 0;
                const sl = parseInt(fields[2]) || 0;
                const thanhTien = gia * sl;
                return { stt: index + 1, ten, sl, gia, thanhTien };
            }) : [];

            // Tính tổng
            let tongSanPham = products.reduce((sum, p) => sum + p.thanhTien, 0);
            let tongTien = tongSanPham + cuocXe;
            let conNo = tongTien - daTra;

            // Điền info section
            const infoSection = document.getElementById('info-section');
            infoSection.innerHTML = `
                <p><span class="font-bold">Ngày:</span> ${ngay}</p>
                <p><span class="font-bold">Khách hàng:</span> ${khachHang}</p>
            `;

            // Điền bảng sản phẩm
            const tableBody = document.getElementById('product-table-body');
            tableBody.innerHTML = products.map(p => `
                <tr>
                    <td class="text-center">${p.stt}</td>
                    <td>${p.ten}</td>
                    <td class="text-center">${p.sl}</td>
                    <td class="text-right">${formatVND(p.gia)}</td>
                    <td class="text-right">${formatVND(p.thanhTien)}</td>
                </tr>
            `).join('');

            // Điền summary
            const summarySection = document.getElementById('summary-section');
            summarySection.innerHTML = `
                <p>Tổng cộng tiền hàng: <span class="font-bold">${formatVND(tongSanPham)}</span></p>
                <p>Cước xe: <span class="font-bold">${formatVND(cuocXe)}</span></p>
                <p class="text-xl font-bold">Tổng tiền: ${formatVND(tongTien)}</p>
            `;

            // Điền ảnh thay thế
            const qrContainer = document.getElementById('qr-container');
            qrContainer.innerHTML = `
                <img src="https://i.ibb.co/bRvnfF47/3d1e3624-8cf9-48da-83d8-e42236e09e0d.jpg" alt="Thanh Toán" class="w-32 h-auto mx-auto mt-2">
            `;
        }
    </script>
</body>

</html>
