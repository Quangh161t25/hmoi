<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Lock&King</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- JSRSAsign for JWT -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/10.5.27/jsrsasign-all-min.js"></script>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#ffffff',
                        card: '#ffffff',
                        border: '#e2e8f0',
                        primary: { DEFAULT: '#2563eb', foreground: '#ffffff' },
                        muted: { DEFAULT: '#f1f5f9', foreground: '#64748b' }
                    }
                }
            }
        }
    </script>
    <style>
        /* CSS Thuần để dự phòng nếu Tailwind lỗi */
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; }
        .hidden { display: none !important; }
        .flex { display: flex !important; }
        .h-screen { height: 100vh !important; }
        .inset-0 { position: fixed; top: 0; right: 0; bottom: 0; left: 0; }
        .z-login { z-index: 100; }
        .bg-login-bg { background-color: #f1f5f9; }
        .flex-center { display: flex; align-items: center; justify-content: center; }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(37, 99, 235, 0.1);
            border-left-color: #2563eb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #sidebar { transition: width 0.3s ease; overflow: hidden; }
        #sidebar.collapsed { width: 72px; }
        #sidebar:not(.collapsed) { width: 260px; }
        .sidebar-text { transition: opacity 0.2s; margin-left: 0.75rem; white-space: nowrap; }
        .collapsed .sidebar-text { opacity: 0; pointer-events: none; }
        .nav-item { display: flex; align-items: center; padding: 0.75rem 1rem; color: #64748b; border-radius: 0.5rem; width: 100%; text-align: left; transition: all 0.2s; }
        .nav-item:hover { background-color: #f1f5f9; color: #2563eb; }
        .nav-item.active { background-color: #eff6ff; color: #2563eb; font-weight: 600; }

        /* User Menu Dropdown Styles */
        #userMenuDropdown {
            transform-origin: top right;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #userMenuDropdown.hidden {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
            display: block !important; /* Block but invisible for transition */
        }
        .user-menu-item {
            display: flex;
            align-items: center;
            padding: 0.625rem 1rem;
            width: 100%;
            border-radius: 0.5rem;
            color: #475569;
            font-size: 0.875rem;
            transition: all 0.15s;
        }
        .user-menu-item:hover {
            background-color: #f8fafc;
            color: #1e293b;
        }
        .user-menu-item svg {
            width: 1.25rem;
            height: 1.25rem;
            margin-right: 0.75rem;
            flex-shrink: 0;
        }
        .user-menu-item.logout {
            color: #ef4444;
        }
        .user-menu-item.logout:hover {
            background-color: #fef2f2;
        }
    </style>
</head>
<body>

    <!-- Màn hình đăng nhập (Mặc định hiện) -->
    <div id="loginScreen" class="inset-0 z-login flex-center bg-login-bg">
        <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm border border-slate-200">
            <div class="flex justify-center mb-6">
                <div class="text-2xl font-bold text-blue-600">Lock&King</div>
            </div>
            <!-- Loading Indicator -->
            <div id="loginLoading" class="hidden text-center py-4">
                <div class="spinner"></div>
                <p class="text-xs text-slate-500 italic">Đang tải dữ liệu nhân viên...</p>
            </div>
            <!-- Form Đăng nhập -->
            <div id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-500">Tài khoản</label>
                    <input type="text" id="usernameInput" class="w-full border border-slate-200 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Nhập ID nhân viên">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-500">Mật khẩu</label>
                    <input type="password" id="passwordInput" class="w-full border border-slate-200 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="••••••••" onkeydown="if(event.key==='Enter') handleLogin()">
                </div>
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-semibold py-2 rounded-lg hover:bg-blue-700 transition">Đăng nhập</button>
            </div>
        </div>
    </div>

    <!-- Màn hình chính (Mặc định ẩn) -->
    <div id="mainApp" class="hidden flex h-screen bg-white text-slate-900">
        <!-- Sidebar -->
        <aside id="sidebar" class="bg-white border-r border-slate-200 flex flex-col h-full z-40">
            <div class="h-16 flex items-center justify-between px-4 shrink-0 border-b border-slate-100">
                <div class="sidebar-text font-bold text-blue-600 text-xl truncate">Lock&King</div>
                <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-50 rounded-lg text-slate-500 transition">
                    <svg id="toggleIcon" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" />
                    </svg>
                </button>
            </div>
            <nav class="flex-1 overflow-y-auto p-3 space-y-1">
                <button class="nav-item active">
                    <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                    <span class="sidebar-text">Trang chủ</span>
                </button>
            </nav>
            <div class="p-4 border-t border-slate-100 text-center sidebar-text text-[10px] text-slate-400 uppercase tracking-widest font-medium">
                Version 2.0
            </div>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
            <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 shrink-0 z-30">
                <div class="flex items-center gap-4">
                    <h1 class="text-lg font-semibold text-slate-800 sm:block hidden">Cổng thông tin</h1>
                </div>
                
                <div class="flex items-center gap-3">
                    <!-- Notifications -->
                    <button class="relative p-2 text-slate-500 hover:bg-slate-50 rounded-full transition">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                        </svg>
                        <span class="absolute top-1 right-1 flex h-4 w-4 items-center justify-center rounded-full bg-blue-600 text-[10px] font-bold text-white ring-2 ring-white">4</span>
                    </button>

                    <!-- User Profile Trigger -->
                    <div class="relative">
                        <button onclick="toggleUserMenu()" id="userMenuButton" class="flex items-center gap-3 p-1 pl-2 hover:bg-slate-50 rounded-full transition border border-transparent hover:border-slate-200">
                            <div id="userProfileInfo" class="flex flex-col items-end leading-tight mr-1">
                                <span id="userNameHeader" class="text-sm font-semibold text-slate-700">---</span>
                                <span id="userRoleHeader" class="text-[11px] font-medium text-slate-400 capitalize">---</span>
                            </div>
                            <div class="relative">
                                <div id="userAvatar" class="w-9 h-9 rounded-xl bg-blue-600 flex items-center justify-center text-white font-bold text-sm shadow-md shadow-blue-200">?</div>
                                <div class="absolute -bottom-0.5 -right-0.5 w-3 h-3 bg-emerald-500 border-2 border-white rounded-full"></div>
                            </div>
                            <svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                            </svg>
                        </button>

                        <!-- User Menu Dropdown -->
                        <div id="userMenuDropdown" class="hidden absolute right-0 mt-2 w-56 bg-white border border-slate-200 rounded-2xl shadow-xl p-1.5 z-50">
                            <div class="px-3 py-2 sm:hidden border-b border-slate-100 mb-1">
                                <div id="userNameHeaderMobile" class="text-sm font-bold text-slate-800">---</div>
                                <div id="userRoleHeaderMobile" class="text-xs text-slate-400 capitalize">---</div>
                            </div>
                            <button class="user-menu-item">
                                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                                Hồ sơ cá nhân
                            </button>
                            <button class="user-menu-item">
                                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37a1.724 1.724 0 002.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                                Cài đặt hệ thống
                            </button>
                            <button class="user-menu-item">
                                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" /></svg>
                                Đổi mật khẩu
                            </button>
                            <div class="my-1 border-t border-slate-100"></div>
                            <button onclick="logout()" class="user-menu-item logout">
                                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                                Đăng xuất
                            </button>
                        </div>
                    </div>
                </div>
            </header>
            <main class="flex-1 overflow-y-auto p-4 md:p-6 bg-slate-50/50">
                <div class="max-w-3xl mx-auto">
                    <div class="bg-white border border-slate-200 p-6 md:p-8 rounded-2xl shadow-sm">
                        <h2 class="text-2xl font-bold mb-6 text-slate-800">Ghi nhận Nhiệt độ Tủ</h2>
                        
                        <div class="space-y-6">
                            <!-- Row QR -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-sm font-medium mb-1 text-slate-600">ID Tủ (QR Code) *</label>
                                    <div class="flex gap-2">
                                        <input type="text" id="input_id_tu" oninput="handleIdTuChange(this.value)" class="flex-1 border border-slate-300 rounded-lg px-4 py-2 focus:ring-blue-500 focus:border-blue-500" placeholder="Nhập hoặc quét mã">
                                        <button type="button" onclick="toggleQRScanner()" class="bg-blue-50 hover:bg-blue-100 text-blue-600 px-4 py-2 rounded-lg border border-blue-200 font-medium transition flex items-center justify-center">
                                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" /></svg>
                                        </button>
                                    </div>
                                    <input type="hidden" id="input_qr_code">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium mb-1 text-slate-600">Tên tủ</label>
                                    <input type="text" id="input_ten" class="w-full bg-slate-50 border border-slate-300 rounded-lg px-4 py-2 text-slate-500" readonly>
                                </div>
                            </div>

                            <div id="qr-scanner-container" class="hidden mb-4 p-4 border border-slate-200 rounded-xl bg-slate-50">
                                <div id="reader" style="width: 100%;"></div>
                                <div class="mt-4 text-center">
                                    <button type="button" onclick="stopQRScanner()" class="px-4 py-2 bg-red-100 text-red-600 rounded-lg text-sm font-medium hover:bg-red-200">Đóng máy quét</button>
                                </div>
                            </div>

                            <!-- Row 2 -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-sm font-medium mb-1 text-slate-600">Vị trí</label>
                                    <input type="text" id="input_vi_tri" class="w-full bg-slate-50 border border-slate-300 rounded-lg px-4 py-2 text-slate-500" readonly>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium mb-1 text-slate-600">Khung giờ</label>
                                    <select id="input_khung_h" class="w-full border border-slate-300 rounded-lg px-4 py-2 focus:ring-blue-500 focus:border-blue-500 bg-white">
                                        <option value="Sáng">Sáng</option>
                                        <option value="Chiều">Chiều</option>
                                    </select>
                                </div>
                            </div>

                            <!-- Row 3: Limits -->
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div>
                                    <label class="block text-sm font-medium mb-1 text-slate-600">Nhiệt độ Tối thiểu</label>
                                    <input type="text" id="input_nhiet_do_min" class="w-full bg-slate-50 border border-slate-300 rounded-lg px-4 py-2 text-slate-500" readonly>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium mb-1 text-slate-600">Nhiệt độ Tối đa</label>
                                    <input type="text" id="input_nhiet_do_max" class="w-full bg-slate-50 border border-slate-300 rounded-lg px-4 py-2 text-slate-500" readonly>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium mb-1 text-blue-600">Nhiệt độ Đo được *</label>
                                    <input type="number" step="any" id="input_nhiet_do_do_dc" oninput="calculateKetQua()" class="w-full border border-blue-400 rounded-lg px-4 py-2 focus:ring-blue-500 focus:border-blue-500 font-bold" placeholder="...">
                                </div>
                            </div>

                            <!-- Row 4 -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-sm font-medium mb-1 text-slate-600">Kết quả</label>
                                    <input type="text" id="input_ket_qua" class="w-full bg-slate-50 border border-slate-300 rounded-lg px-4 py-2 font-bold text-slate-700 uppercase" readonly>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium mb-1 text-slate-600">Ghi chú</label>
                                    <textarea id="input_ghi_chu" rows="2" class="w-full border border-slate-300 rounded-lg px-4 py-2 focus:ring-blue-500 focus:border-blue-500" placeholder="..."></textarea>
                                </div>
                            </div>

                            <!-- Signature -->
                            <div>
                                <label class="block text-sm font-medium mb-1 text-slate-600">Chữ ký người xác nhận</label>
                                <div class="border border-slate-300 rounded-lg bg-white w-full overflow-hidden relative shadow-inner" style="height: 150px;">
                                    <canvas id="signature-pad" class="w-full h-full cursor-crosshair"></canvas>
                                </div>
                                <div class="mt-2 text-right">
                                    <button type="button" onclick="clearSignature()" class="text-sm text-slate-500 hover:text-red-500 transition">Làm lại chữ ký</button>
                                </div>
                            </div>

                            <div class="pt-4 border-t border-slate-200">
                                <button type="button" id="btnSubmit" onclick="submitData()" class="w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-200/50 transition flex justify-center items-center gap-2 text-lg">
                                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                                    </svg>
                                    XÁC NHẬN VÀ LƯU DỮ LIỆU
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // --- LOGIC CONFIG ---
        const CONFIG = {
            spreadsheetId: "1vktnQy5rzIGrYN5YE6fVz3YgYi2RalRBlMO__DUv0yc",

        async function fetchAuthData() {
            const loading = document.getElementById('loginLoading');
            const form = document.getElementById('loginForm');
            if (loading) loading.classList.remove('hidden');
            if (form) form.classList.add('hidden');

            try {
                const token = await getAccessToken();
                const sid = CONFIG.spreadsheetId;
                const sname = CONFIG.authSheetName;
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/${sname}!A1:Z200`;

                const resp = await fetch(url, { headers: { "Authorization": `Bearer ${token}` } });
                const data = await resp.json();

                if (data.values && data.values.length > 1) {
                    const headers = data.values[0].map(h => h ? h.toString().trim().toLowerCase() : '');
                    const iId = headers.findIndex(h => h === 'id');
                    const iName = headers.findIndex(h => h === 'ho_ten' || h === 'họ tên' || h === 'name' || h === 'ten');
                    const iPass = headers.findIndex(h => h === 'password' || h === 'mat_khau');
                    const iRole = headers.findIndex(h => h === 'role' || h === 'quyen');

                    usersData = data.values.slice(1).map(r => ({
                        id: iId !== -1 ? (r[iId] || '') : (r[0] || ''),
                        name: iName !== -1 ? (r[iName] || '') : (r[1] || ''),
                        role: iRole !== -1 ? (r[iRole] || '') : (r[5] || ''),
                        password: iPass !== -1 ? (r[iPass] || '') : (r[6] || '')
                    })).filter(u => u.id);
                }
            } catch (err) {
                console.error("Auth Fetch Error:", err);
            } finally {
                if (loading) loading.classList.add('hidden');
                if (form) form.classList.remove('hidden');
            }
        }

        async function getAccessToken() {
            if (accessToken && Date.now() < tokenExpiry - 300000) return accessToken;
            const header = { alg: "RS256", typ: "JWT" };
            const now = Math.floor(Date.now() / 1000);
            const payload = {
                iss: CONFIG.serviceAccountEmail,
                scope: CONFIG.scopes.join(" "),
                aud: CONFIG.tokenUrl,
                exp: now + 3600,
                iat: now
            };
            const sJWT = KJUR.jws.JWS.sign("RS256", JSON.stringify(header), JSON.stringify(payload), CONFIG.privateKey);

            try {
                const response = await fetch(CONFIG.tokenUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: `grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=${sJWT}`
                });
                const data = await response.json();
                accessToken = data.access_token;
                tokenExpiry = Date.now() + (data.expires_in * 1000);
                return accessToken;
            } catch (err) { alert("Không thể xác thực với Google API"); return null; }
        }

        function handleLogin() {
            const uid = document.getElementById('usernameInput').value.trim();
            const pwd = document.getElementById('passwordInput').value.trim();
            if (!uid || !pwd) return alert("Vui lòng nhập đầy đủ thông tin.");

            const user = usersData.find(u => u.id === uid && (u.password ? u.password.toString() : "") === pwd);
            if (user) {
                currentUser = user;
                localStorage.setItem('erp_user_session', JSON.stringify(user));
                updateUserProfileUI();
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                setTimeout(initSignature, 300);
                populateKhungGio('');
            } else {
                alert('Tài khoản hoặc mật khẩu không chính xác!');
            }
        }

        async function fetchDsTuData() {

                if (!token) return;
                const sid = CONFIG.spreadsheetId;
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/DS_TU!A1:Z1000`;
                
                const resp = await fetch(url, { headers: { "Authorization": `Bearer ${token}` } });
                if (!resp.ok) return;
                const data = await resp.json();

                if (data.values && data.values.length > 1) {
                    const headers = data.values[0].map(h => h ? h.toString().trim().toLowerCase() : '');
                    const iId = headers.findIndex(h => h === 'id' || h === 'id_tu');
                    const iTen = headers.findIndex(h => h === 'ten' || h === 'tên' || h === 'tên tủ');
                    const iViTri = headers.findIndex(h => h === 'vi_tri' || h === 'vị trí');
                    const iMin = headers.findIndex(h => h === 'nhiet_do_min' || h === 'nhiệt độ min' || h === 'min');
                    const iMax = headers.findIndex(h => h === 'nhiet_do_max' || h === 'nhiệt độ max' || h === 'max');

                    dsTuData = data.values.slice(1).map(r => ({
                        id: iId !== -1 ? r[iId] : r[0],
                        ten: iTen !== -1 ? r[iTen] : r[1],
                        vi_tri: iViTri !== -1 ? r[iViTri] : (r[2] || ''),
                        nhiet_do_min: iMin !== -1 ? r[iMin] : r[3],
                        nhiet_do_max: iMax !== -1 ? r[iMax] : r[4]
                    })).filter(t => t.id);
                }
            } catch (err) {
                console.error("Fetch DS_TU Error:", err);
            }
        }

        // --- QR SCANNER LOGIC ---
        function toggleQRScanner() {
            const container = document.getElementById('qr-scanner-container');
            if (container.classList.contains('hidden')) {
                container.classList.remove('hidden');
                if (!html5QrcodeScanner) {
                    html5QrcodeScanner = new Html5QrcodeScanner(
                        "reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
                    html5QrcodeScanner.render(onScanSuccess, onScanFailure);
                }
            } else {
                stopQRScanner();
            }
        }

        function stopQRScanner() {
            const container = document.getElementById('qr-scanner-container');
            container.classList.add('hidden');
            if (html5QrcodeScanner) {
                html5QrcodeScanner.clear().catch(err => console.error(err));
                html5QrcodeScanner = null;
            }
        }

        function onScanSuccess(decodedText, decodedResult) {
            document.getElementById('input_id_tu').value = decodedText;
            document.getElementById('input_qr_code').value = decodedText;
            handleIdTuChange(decodedText);
            stopQRScanner();
        }

        function onScanFailure(error) { /* wait for valid scan */ }

        // --- FORM LOGIC ---
        function handleIdTuChange(idTu) {
            const tuInfo = dsTuData.find(t => String(t.id).trim().toLowerCase() === String(idTu).trim().toLowerCase());
            let typeName = String(idTu).toLowerCase();
            
            if (tuInfo) {
                document.getElementById('input_ten').value = tuInfo.ten || '';
                document.getElementById('input_vi_tri').value = tuInfo.vi_tri || '';
                document.getElementById('input_nhiet_do_min').value = tuInfo.nhiet_do_min || '';
                document.getElementById('input_nhiet_do_max').value = tuInfo.nhiet_do_max || '';
                typeName = tuInfo.ten ? String(tuInfo.ten).toLowerCase() : typeName;
            } else {
                document.getElementById('input_ten').value = '';
                document.getElementById('input_vi_tri').value = '';
                document.getElementById('input_nhiet_do_min').value = '';
                document.getElementById('input_nhiet_do_max').value = '';
            }
            
            populateKhungGio(typeName);
            calculateKetQua();
        }

        function populateKhungGio(tuTypeStr) {
            const khungSelect = document.getElementById('input_khung_h');
            khungSelect.innerHTML = '';
            const hr = new Date().getHours();
            
            if (tuTypeStr.includes('huyết tương')) {
                ['L1', 'L2', 'L3', 'L4', 'L5', 'L6'].forEach(opt => {
                    const option = document.createElement('option');
                    option.value = opt;
                    option.text = opt;
                    khungSelect.appendChild(option);
                });
                let idx = Math.floor(hr / 4);
                khungSelect.selectedIndex = idx > 5 ? 5 : idx;
            } else {
                ['Sáng', 'Chiều'].forEach(opt => {
                    const option = document.createElement('option');
                    option.value = opt;
                    option.text = opt;
                    khungSelect.appendChild(option);
                });
                khungSelect.value = (hr >= 12) ? 'Chiều' : 'Sáng';
            }
        }

        function calculateKetQua() {
            const valStr = document.getElementById('input_nhiet_do_do_dc').value;
            const minStr = document.getElementById('input_nhiet_do_min').value;
            const maxStr = document.getElementById('input_nhiet_do_max').value;
            
            if (valStr === '' || minStr === '' || maxStr === '') {
                document.getElementById('input_ket_qua').value = '';
                return;
            }
            
            const val = parseFloat(valStr.replace(',','.'));
            const min = parseFloat(String(minStr).replace(',','.'));
            const max = parseFloat(String(maxStr).replace(',','.'));
            
            let kq = "ĐẠT";
            if (val < min) kq = "THẤP";
            if (val > max) kq = "CAO";
            
            document.getElementById('input_ket_qua').value = kq;
            
            const kqEl = document.getElementById('input_ket_qua');
            if(kq === "ĐẠT") kqEl.className = "w-full bg-green-50 border border-green-300 rounded-lg px-4 py-2 font-bold text-green-700 uppercase";
            else if(kq === "THẤP") kqEl.className = "w-full bg-blue-50 border border-blue-300 rounded-lg px-4 py-2 font-bold text-blue-700 uppercase";
            else kqEl.className = "w-full bg-red-50 border border-red-300 rounded-lg px-4 py-2 font-bold text-red-700 uppercase";
        }

        function initSignature() {
            const canvas = document.getElementById('signature-pad');
            if(canvas && !signaturePad) {
                function resizeCanvas() {
                    const ratio =  Math.max(window.devicePixelRatio || 1, 1);
                    canvas.width = canvas.offsetWidth * ratio;
                    canvas.height = canvas.offsetHeight * ratio;
                    canvas.getContext("2d").scale(ratio, ratio);
                }
                window.addEventListener("resize", resizeCanvas);
                resizeCanvas();
                signaturePad = new SignaturePad(canvas, { backgroundColor: 'rgb(255, 255, 255)' });
            }
        }

        function clearSignature() {
            if(signaturePad) signaturePad.clear();
        }

        // --- SUBMIT DATA API ---
        async function submitData() {
            const idTu = document.getElementById('input_id_tu').value;
            if (!idTu) return alert("Vui lòng quét hoặc nhập mã Tủ (id_tu)!");
            const valDo = document.getElementById('input_nhiet_do_do_dc').value;
            if (valDo === '') return alert("Vui lòng nhập nhiệt độ đo được!");
            
            const btn = document.getElementById('btnSubmit');
            const oriText = btn.innerHTML;
            btn.innerHTML = 'Đang tiến hành lưu...';
            btn.disabled = true;
            
            try {
                const token = await getAccessToken();
                const now = new Date();
                const pad0 = n => n<10?'0'+n:n;
                
                const id_val = now.getTime().toString();
                const ngay_val = `${pad0(now.getDate())}/${pad0(now.getMonth()+1)}/${now.getFullYear()}`;
                const ngay_h_val = `${pad0(now.getHours())}:${pad0(now.getMinutes())} - ${ngay_val}`;
                const khung_h_val = document.getElementById('input_khung_h').value;
                const qr_code_val = document.getElementById('input_qr_code').value || idTu;
                const id_tu_val = idTu;
                const ten_val = document.getElementById('input_ten').value;
                const vi_tri_val = document.getElementById('input_vi_tri').value;
                const nhiet_do_min_val = document.getElementById('input_nhiet_do_min').value;
                const nhiet_do_max_val = document.getElementById('input_nhiet_do_max').value;
                const nhiet_do_do_dc_val = valDo;
                const ket_qua_val = document.getElementById('input_ket_qua').value;
                const id_nv_val = currentUser ? (currentUser.id || currentUser.name) : '';
                const ghi_chu_val = document.getElementById('input_ghi_chu').value;
                
                let chu_ky_val = '';
                if (signaturePad && !signaturePad.isEmpty()) {
                    chu_ky_val = signaturePad.toDataURL();
                }
                
                const xac_nhan_val = "Đã xác nhận";
                const udt_val = now.toISOString();
                const lb1_val = `${id_tu_val} | ${nhiet_do_do_dc_val} | ${ket_qua_val}`;
                const nam_thang_val = `${now.getFullYear()}/${pad0(now.getMonth()+1)}`;
                const nam_thang_tu_val = `${nam_thang_val} | ${id_tu_val}`;
                
                const rowData = [
                    id_val, ngay_val, ngay_h_val, khung_h_val, qr_code_val,
                    id_tu_val, ten_val, vi_tri_val, nhiet_do_min_val, nhiet_do_max_val,
                    nhiet_do_do_dc_val, ket_qua_val, id_nv_val, ghi_chu_val, chu_ky_val,
                    xac_nhan_val, udt_val, lb1_val, nam_thang_val, nam_thang_tu_val
                ];
                
                const sid = CONFIG.spreadsheetId;
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/DATA:append?valueInputOption=USER_ENTERED`;
                
                const res = await fetch(url, {
                    method: 'POST',
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ values: [rowData] })
                });
                
                if (res.ok) {
                    alert("Lưu dữ liệu thành công!");
                    // Reset
                    document.getElementById('input_id_tu').value = '';
                    document.getElementById('input_qr_code').value = '';
                    handleIdTuChange(''); 
                    document.getElementById('input_nhiet_do_do_dc').value = '';
                    document.getElementById('input_ghi_chu').value = '';
                    clearSignature();
                } else {
                    const err = await res.json();
                    console.error(err);
                    alert("Lỗi khi lưu dữ liệu. Vui lòng thử lại!");
                }
            } catch(e) {
                console.error(e);
                alert("Có lỗi xảy ra: " + e.message);
            } finally {
                btn.innerHTML = oriText;
                btn.disabled = false;
            }
        }
