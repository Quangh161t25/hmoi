<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Google Sheets - Premium Edition</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- JSRSAsign for JWT -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/10.5.27/jsrsasign-all-min.js"></script>
    <!-- XLSX Library for Excel Parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #111827;
            --primary-hover: #1f2937;
            --bg-slate: #ffffff;
            --glass-bg: #ffffff;
            --glass-border: #e5e7eb;
            --text-main: #111827;
            --text-dim: #6b7280;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-slate);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
        }

        /* Animated Background Blobs */
        .blobs {
            display: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            opacity: 0.4;
            animation: move 20s infinite alternate;
            will-change: transform;
            transform: translateZ(0);
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: rgba(99, 102, 241, 0.3);
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: rgba(168, 85, 247, 0.2);
            bottom: -50px;
            right: -50px;
            animation-duration: 25s;
        }

        .blob-3 {
            width: 300px;
            height: 300px;
            background: rgba(45, 212, 191, 0.2);
            top: 40%;
            left: 50%;
            animation-duration: 30s;
        }

        @keyframes move {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(100px, 50px) scale(1.1);
            }
        }

        /* Container & Glassmorphism */
        .container {
            width: 100%;
            max-width: 100%;
            background: transparent;
            padding: 1rem;
        }

        @media (max-width: 600px) {
            .container {
                padding: 0.5rem;
            }
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-main);
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 300px;
            position: relative;
        }

        input {
            width: 100%;
            background: #ffffff;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            color: var(--text-main);
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        button {
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: #ffffff;
            border: 1px solid var(--glass-border);
            color: var(--text-main);
        }

        .btn-outline:hover {
            background: #f9fafb;
        }

        /* Table */
        .table-container {
            overflow-x: auto;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        /* Tab System */
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 1rem;
        }

        .tab-btn {
            background: transparent;
            color: var(--text-dim);
            padding: 0.7rem 1.5rem;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .tab-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        th {
            background: #f9fafb;
            padding: 1rem;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        td {
            padding: 1rem;
            border-top: 1px solid var(--glass-border);
            font-size: 0.95rem;
        }

        tr:hover td {
            background: #f9fafb;
        }

        .btn-edit {
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
            border-radius: 8px;
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
        }

        .btn-edit:hover {
            background: var(--primary);
            color: white;
        }

        .btn-save {
            background: #10b981;
            color: white;
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
            border-radius: 8px;
        }

        .btn-save:hover {
            background: #059669;
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
            border-radius: 8px;
        }

        .btn-delete:hover {
            background: #ef4444;
            color: white;
        }

        .text-input-inline {
            width: 100%;
            background: #ffffff;
            border: 1px solid var(--primary);
            border-radius: 6px;
            padding: 0.4rem 0.6rem;
            color: var(--text-main);
            font-size: 0.9rem;
        }

        .action-cell {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .form-card {
            background: #ffffff;
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.25rem;
            max-width: 820px;
            width: 100%;
        }

        @media (max-width: 600px) {
            .form-card {
                padding: 0.9rem 0.75rem;
                border-radius: 12px;
            }
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .form-help {
            color: var(--text-dim);
            margin-bottom: 1rem;
            font-size: 0.92rem;
        }

        .data-list-mode {
            display: none;
            margin-top: 1rem;
        }

        .data-list-header {
            margin-bottom: 0.75rem;
            color: var(--text-main);
            font-weight: 600;
        }

        .data-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
        }

        .data-tab-btn {
            padding: 0.55rem 0.9rem;
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            background: #ffffff;
            color: var(--text-main);
            cursor: pointer;
            font-weight: 600;
        }

        .data-tab-btn.active {
            background: var(--primary);
            color: #ffffff;
        }

        .data-tab-content {
            display: none;
        }

        .data-tab-content.active {
            display: block;
        }

        .empty-list-note {
            padding: 1rem;
            border: 1px dashed #d1d5db;
            border-radius: 10px;
            color: var(--text-dim);
            font-size: 0.92rem;
            background: #fafafa;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--glass-border);
        }

        .page-info {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        /* Sorting */
        th {
            cursor: pointer;
            user-select: none;
            position: relative;
            padding-right: 1.5rem !important;
        }

        th:hover {
            background: #f3f4f6 !important;
        }

        .sort-icon {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.8rem;
            opacity: 0.3;
        }

        th.sorted-asc .sort-icon::after {
            content: "▲";
            opacity: 1;
        }

        th.sorted-desc .sort-icon::after {
            content: "▼";
            opacity: 1;
        }

        th:not(.sorted-asc):not(.sorted-desc) .sort-icon::after {
            content: "↕";
        }

        /* Auto-save status */
        .save-status {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 0.8rem 1.5rem;
            background: #10b981;
            color: white;
            border-radius: 12px;
            font-weight: 600;
            box-shadow: 0 10px 15px -3px rgba(17, 24, 39, 0.12);
            display: none;
            z-index: 1000;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 1rem;
        }

        .modal {
            background: #ffffff;
            border: 1px solid var(--glass-border);
            padding: 2rem;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            animation: modalIn 0.3s ease-out;
        }

        @keyframes modalIn {
            from {
                transform: scale(0.9);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-header {
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .modal-footer {
            margin-top: 2rem;
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }

        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 3rem;
            color: var(--text-dim);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e5e7eb;
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Settings Icon */
        .icon {
            width: 20px;
            height: 200px;
        }

        /* Upload Button in Table */
        .btn-upload-inline {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            padding: 4px;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 4px;
            display: flex;
            align-items: center;
            transition: all 0.2s;
        }

        .btn-upload-inline:hover {
            background: #10b981;
            color: white;
        }

        /* Image Preview Styles */
        .img-preview {
            max-width: 60px;
            max-height: 40px;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.2s;
            object-fit: cover;
            border: 1px solid #d1d5db;
        }

        .img-preview:hover {
            transform: scale(1.1);
            border-color: var(--primary);
        }

        /* Image Upload Modal (Iframe) */
        .image-modal-content {
            width: 95%;
            height: 90vh;
            max-width: 1000px;
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .image-modal-header {
            background: #111827;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        #imageUploadIframe {
            width: 100%;
            flex: 1;
            border: none;
        }

        /* Fullscreen Image Overlay */
        .image-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            cursor: zoom-out;
        }

        .image-overlay img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            animation: zoomIn 0.3s ease-out;
        }

        @keyframes zoomIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Banner giới thiệu */
        .form-banner {
            margin-bottom: 1.25rem;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
        }

        .form-banner img {
            width: 100%;
            display: block;
            height: auto;
        }

        .form-banner-body {
            padding: 1rem 1.1rem;
            background: #f9fafb;
        }

        .form-banner-desc {
            font-size: 0.97rem;
            color: var(--text-main);
            line-height: 1.6;
            margin-bottom: 0.6rem;
        }

        .form-banner-hotline {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.93rem;
            color: var(--text-dim);
            font-weight: 500;
            flex-wrap: wrap;
        }

        .form-banner-hotline span {
            color: #111827;
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .form-banner img {
                border-radius: 0;
            }

            .form-banner-desc {
                font-size: 0.9rem;
            }

            h1 {
                font-size: 1.3rem;
            }

            .controls {
                flex-direction: column;
            }

            button {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body>

                <label>Spreadsheet ID</label>

    <script>
        // --- CẤU HÌNH MẶC ĐỊNH ---
        const CONFIG = {

        // --- AUTHENTICATION ---
        async function getAccessToken() {
            // Kiểm tra token cũ còn hạn không (trừ hao 5 phút)
            if (accessToken && Date.now() < tokenExpiry - 300000) {
                return accessToken;
            }

            const header = { alg: "RS256", typ: "JWT" };
            const now = Math.floor(Date.now() / 1000);
            const payload = {
                iss: CONFIG.serviceAccountEmail,
                scope: CONFIG.scopes.join(" "),
                aud: CONFIG.tokenUrl,
                exp: now + 3600,
                iat: now
            };

            const sHeader = JSON.stringify(header);
            const sPayload = JSON.stringify(payload);
            const sJWT = KJUR.jws.JWS.sign("RS256", sHeader, sPayload, CONFIG.privateKey);

            try {
                const response = await fetch(CONFIG.tokenUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: `grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=${sJWT}`
                });
                const data = await response.json();
                accessToken = data.access_token;
                tokenExpiry = Date.now() + (data.expires_in * 1000);
                return accessToken;
            } catch (err) {
                console.error("Lỗi lấy token:", err);
                alert("Không thể xác thực với Google API");
            }
        }

        // --- DATA OPERATIONS ---
        async function fetchData() {
            // Đừng refresh bảng khi đang có dòng sửa/thêm
            if (editingRowIndex !== null) return;

            const loading = document.getElementById('loading');
            loading.style.display = 'block';

            try {
                const token = await getAccessToken();
                const sid = localStorage.getItem('gs_id') || CONFIG.spreadsheetId;
                const sname = CONFIG.sheets[activeForm].sheetName;

                const url = `https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/${sname}!A:Z`;
                const response = await fetch(url, {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                const result = await response.json();

                if (result.values) {
                    currentData = result.values;
                    try { localStorage.setItem('gs_cached_data', JSON.stringify(currentData)); } catch (e) { }
                    currentPage = 1;
                    sortConfig = { col: null, dir: 'asc' };
                    filterAndSortData();
                } else {
                    alert("Sheet không có dữ liệu hoặc lỗi cấu hình.");
                }
            } catch (err) {
                console.error("Fetch error:", err);
            } finally {
                loading.style.display = 'none';
            }
        }

        async function handleExcelUpload(input) {
            const file = input.files[0];
            if (!file) return;

            const statusLabel = document.getElementById('saveStatus');
            statusLabel.textContent = "Đang xử lý file Excel...";
            statusLabel.style.display = 'block';

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    if (!currentData || currentData.length === 0) {
                        alert("Dữ liệu Google Sheets chưa được tải. Hãy nhấn 'Làm mới' hoặc đợi quá trình tải hoàn tất.");
                        statusLabel.style.display = 'none';
                        return;
                    }

                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];

                    // Lấy dữ liệu dạng mảng (header: 1 để lấy dòng đầu làm mảng header)
                    const json = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                    if (json.length < 2) {
                        alert("File Excel không có dữ liệu hoặc chỉ có tiêu đề.");
                        statusLabel.style.display = 'none';
                        return;
                    }

                    // Map headers
                    const excelHeaders = json[0].map(h => h ? h.toString().trim() : "");
                    const sheetHeaders = currentData[0].map(h => h ? h.toString().trim() : "");
                    const rowsToImport = json.slice(1);

                    // Lọc những dòng thực sự có dữ liệu
                    const cleanRowsToImport = rowsToImport.filter(row => row.some(cell => cell !== null && cell !== undefined && cell !== ""));

                    if (cleanRowsToImport.length === 0) {
                        alert("Không tìm thấy dòng dữ liệu nào hợp lệ trong file Excel.");
                        statusLabel.style.display = 'none';
                        return;
                    }

                    // Mapping dữ liệu: Dựa trên tên cột của Google Sheet để lấy dữ liệu từ Excel tương ứng
                    const importedData = cleanRowsToImport.map(excelRow => {
                        const newRow = new Array(sheetHeaders.length).fill("");
                        sheetHeaders.forEach((header, sIdx) => {
                            const eIdx = excelHeaders.findIndex(eh => eh.toLowerCase() === header.toLowerCase());
                            if (eIdx !== -1) {
                                newRow[sIdx] = excelRow[eIdx] !== undefined ? excelRow[eIdx] : "";
                            }
                        });
                        return newRow;
                    });

                    if (confirm(`Tìm thấy ${cleanRowsToImport.length} dòng dữ liệu. Bạn có muốn tải lên Google Sheets không?`)) {
                        await uploadBatchData(importedData);
                    }
                } catch (err) {
                    console.error("Excel parse error:", err);
                    alert("Lỗi khi đọc file Excel: " + err.message);
                } finally {
                    statusLabel.style.display = 'none';
                    statusLabel.textContent = "Đang lưu thay đổi...";
                    input.value = "";
                }
            };
            reader.readAsArrayBuffer(file);
        }

        async function uploadBatchData(rows) {
            const statusLabel = document.getElementById('saveStatus');
            statusLabel.textContent = `Đang xóa dữ liệu cũ và chuẩn bị tải ${rows.length} dòng lên...`;
            statusLabel.style.display = 'block';

            try {
                const token = await getAccessToken();
                const sid = localStorage.getItem('gs_id') || CONFIG.spreadsheetId;
                const sname = CONFIG.sheets[activeForm].sheetName;

                // 1. Xóa dữ liệu cũ từ dòng 2 trở đi
                const clearRange = `${sname}!A2:ZZ`;
                const clearUrl = `https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/${clearRange}:clear`;

                statusLabel.textContent = "Đang dọn dẹp dữ liệu cũ...";
                await fetch(clearUrl, {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${token}` }
                });

                // 2. Tải dữ liệu mới lên
                statusLabel.textContent = `Đang tải ${rows.length} dòng mới lên...`;
                const appendUrl = `https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/${sname}!A2:append?valueInputOption=USER_ENTERED`;

                const response = await fetch(appendUrl, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        values: rows
                    })
                });

                if (response.ok) {
                    alert(`Đã làm sạch bảng và tải lên thành công ${rows.length} dòng.`);
                    await fetchData(); // Làm mới bảng dữ liệu
                } else {
                    const err = await response.json();
                    alert("Lỗi khi tải dữ liệu lên Google Sheets: " + (err.error ? err.error.message : "Không xác định"));
                }
            } catch (err) {
                console.error("Batch upload error:", err);
                alert("Lỗi kết nối khi tải dữ liệu. Vui lòng thử lại.");
            } finally {
                statusLabel.style.display = 'none';
            }
        }

        function filterAndSortData() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const rawHeaders = currentData[0];
            let data = currentData.slice(1);

            // Xác định danh sách cột đang được hiển thị
            let visibleIndices = [];
            if (CONFIG.sheets[activeForm].displayColumns && CONFIG.sheets[activeForm].displayColumns.length > 0) {
                CONFIG.sheets[activeForm].displayColumns.forEach(colName => {
                    const idx = rawHeaders.indexOf(colName);
                    if (idx !== -1) visibleIndices.push(idx);
                });
            } else {
                visibleIndices = rawHeaders.map((_, i) => i);
            }

            // 1. Chỉ hiển thị dòng mà các cột "đang hiển thị" có dữ liệu (Ngoại trừ dòng đang sửa)
            data = data.filter((row, index) => {
                const absIdx = currentData.indexOf(row);
                if (absIdx === editingRowIndex) return true;
                return visibleIndices.some(idx => row[idx] && row[idx].toString().trim() !== "");
            });

            // 2. Filter theo từ khóa tìm kiếm (Ngoại trừ dòng đang sửa)
            if (term) {
                data = data.filter(row => {
                    const absIdx = currentData.indexOf(row);
                    if (absIdx === editingRowIndex) return true;
                    return visibleIndices.some(idx => row[idx] && row[idx].toString().toLowerCase().includes(term));
                });
            }

            // 3. Sort
            if (sortConfig.col !== null) {
                data.sort((a, b) => {
                    // Đưa dòng đang sửa lên đầu nếu là dòng mới thêm
                    if (isAddingNewRow) {
                        if (currentData.indexOf(a) === editingRowIndex) return -1;
                        if (currentData.indexOf(b) === editingRowIndex) return 1;
                    }

                    let valA = a[sortConfig.col] || "";
                    let valB = b[sortConfig.col] || "";

                    const numA = parseFloat(valA);
                    const numB = parseFloat(valB);
                    if (!isNaN(numA) && !isNaN(numB)) {
                        valA = numA;
                        valB = numB;
                    }

                    if (valA < valB) return sortConfig.dir === 'asc' ? -1 : 1;
                    if (valA > valB) return sortConfig.dir === 'asc' ? 1 : -1;
                    return 0;
                });
            }

            displayData = [rawHeaders, ...data];
            renderTable();
        }

        function renderTable() {
            const head = document.getElementById('tableHead');
            const body = document.getElementById('tableBody');
            head.innerHTML = '';
            body.innerHTML = '';

            if (displayData.length === 0) return;

            const headFragment = document.createDocumentFragment();
            const bodyFragment = document.createDocumentFragment();

            const rawHeaders = displayData[0];

            // Xác định danh sách cột cần hiển thị
            let visibleIndices = [];
            const sheetHeaders = displayData[0].map(h => h.toString().trim().toLowerCase());

            if (CONFIG.sheets[activeForm].displayColumns && CONFIG.sheets[activeForm].displayColumns.length > 0) {
                CONFIG.sheets[activeForm].displayColumns.forEach(target => {
                    const targetClean = target.toString().trim().toLowerCase();
                    const idx = sheetHeaders.indexOf(targetClean);
                    if (idx !== -1) visibleIndices.push(idx);
                });
            } else {
                visibleIndices = rawHeaders.map((_, i) => i);
            }

            // Render Header
            const thStt = document.createElement('th');
            thStt.textContent = "#";
            thStt.style.width = "50px";
            headFragment.appendChild(thStt);

            visibleIndices.forEach(idx => {
                const h = rawHeaders[idx];
                const th = document.createElement('th');
                th.innerHTML = `${h} <span class="sort-icon"></span>`;
                th.onclick = () => handleSort(idx);
                if (sortConfig.col === idx) {
                    th.className = sortConfig.dir === 'asc' ? 'sorted-asc' : 'sorted-desc';
                }
                headFragment.appendChild(th);
            });

            // Render Body
            const totalRows = displayData.length - 1;
            const totalPages = Math.ceil(totalRows / rowsPerPage) || 1;
            if (currentPage > totalPages) currentPage = totalPages;

            const startIdx = (currentPage - 1) * rowsPerPage + 1;
            const endIdx = Math.min(startIdx + rowsPerPage, displayData.length);
            const pageData = displayData.slice(startIdx, endIdx);

            pageData.forEach((row, pIdx) => {
                const absoluteIndex = currentData.indexOf(row);
                const tr = document.createElement('tr');
                const isEditing = (editingRowIndex === absoluteIndex);

                const tdStt = document.createElement('td');
                tdStt.textContent = startIdx + pIdx;
                tdStt.style.color = "var(--text-dim)";
                tr.appendChild(tdStt);

                visibleIndices.forEach((colIndex, vIdx) => {
                    const td = document.createElement('td');
                    if (isEditing) {
                        const isFirst = (vIdx === 0);
                        const columnName = rawHeaders[colIndex] ? rawHeaders[colIndex].toString().trim().toLowerCase() : "";
                        const isAnhColumn = (columnName === 'anh' || columnName === 'ảnh');

                        td.innerHTML = `
                            <div style="display: flex; align-items: center; gap: 4px;">
                                <input type="text" class="text-input-inline edit-inline-input" 
                                    data-col="${colIndex}" value="${row[colIndex] || ''}" 
                                    ${isFirst ? 'id="firstEditInput"' : ''} 
                                    onblur="handleRowBlur()">
                                ${isAnhColumn ? `
                                <label class="btn-upload-inline" title="Tải ảnh lên" onmousedown="isUploading=true">
                                    <input type="file" style="display: none;" onchange="handleImageUpload(this, ${colIndex})">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                                </label>
                                ` : ''}
                            </div>
                        `;
                    } else {
                        const cellValue = row[colIndex] || "";
                        if (isImageUrl(cellValue)) {
                            td.innerHTML = `<img src="${cellValue}" class="img-preview" onclick="zoomImage('${cellValue.replace(/'/g, "\\'")}')" onerror="this.parentElement.textContent='${cellValue.replace(/'/g, "\\'")}'">`;
                        } else {
                            td.textContent = cellValue;
                        }
                    }
                    tr.appendChild(td);
                });

                bodyFragment.appendChild(tr);
            });

            head.appendChild(headFragment);
            body.appendChild(bodyFragment);

            // Tự động focus vào ô đầu tiên khi mở chế độ sửa
            const firstInput = document.getElementById('firstEditInput');
            if (firstInput) {
                setTimeout(() => firstInput.focus(), 50);
            }

            document.getElementById('pageInfo').textContent = `Trang ${currentPage} / ${totalPages}`;
            document.getElementById('prevPage').disabled = currentPage === 1;
            document.getElementById('nextPage').disabled = currentPage === totalPages;
        }

        function handleSort(colIndex) {
            if (sortConfig.col === colIndex) {
                sortConfig.dir = sortConfig.dir === 'asc' ? 'desc' : 'asc';
            } else {
                sortConfig.col = colIndex;
                sortConfig.dir = 'asc';
            }
            filterAndSortData();
        }

        function changePage(delta) {
            currentPage += delta;
            renderTable();
        }

        function filterData() {
            currentPage = 1;
            filterAndSortData();
        }

        function handleSearchInput() {
            if (searchTimeout) clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                filterData();
            }, 300); // 300ms debounce
        }

        // --- INLINE EDIT & SAVE ---
        function startInlineEdit(rowIndex) {
            if (isAddingNewRow) return alert("Vui lòng hoàn tất hoặc hủy dòng đang thêm.");
            editingRowIndex = rowIndex;
            renderTable();
        }

        function cancelInlineEdit() {
            if (isAddingNewRow) {
                currentData.splice(editingRowIndex, 1);
                isAddingNewRow = false;
            }
            editingRowIndex = null;
            filterAndSortData();
        }

        // Tự động lưu khi rời khỏi dòng
        function handleRowBlur() {
            // Đợi một chút để activeElement cập nhật
            setTimeout(() => {
                if (isUploading || isSaving) return; // Nếu đang upload hoặc đang lưu thì không tự động lưu/đóng mode sửa

                const active = document.activeElement;
                // Nếu item mới focus không nằm trong class 'edit-inline-input', nghĩa là đã rời khỏi dòng
                if (!active || !active.classList.contains('edit-inline-input')) {
                    if (editingRowIndex !== null) {
                        saveData();
                    }
                }
            }, 150);
        }

        async function saveData() {
            if (isSaving) return;
            isSaving = true;
            const statusLabel = document.getElementById('saveStatus');
            try {
                const inputs = document.querySelectorAll('.edit-inline-input');

                // Nếu không có input và không phải đang add mới, có thể là do re-render
                if (inputs.length === 0 && !isAddingNewRow) return;

                const rawHeaders = currentData[0];
                const newData = new Array(rawHeaders.length).fill("");

                // Điền dữ liệu cũ vào newData trước
                currentData[editingRowIndex].forEach((val, idx) => {
                    if (idx < newData.length) newData[idx] = val;
                });

                let hasChange = false;

                if (inputs.length > 0) {
                    inputs.forEach(input => {
                        const col = parseInt(input.getAttribute('data-col'));
                        const val = input.value || "";
                        if (newData[col] !== val) {
                            newData[col] = val;
                            hasChange = true;
                        }
                    });
                } else if (isAddingNewRow) {
                    hasChange = true;
                }

                // Nếu không có gì thay đổi, chỉ cần đóng chế độ sửa
                if (!hasChange && !isAddingNewRow) {
                    editingRowIndex = null;
                    renderTable();
                    return;
                }

                statusLabel.style.display = 'block';
                const token = await getAccessToken();
                const sid = localStorage.getItem('gs_id') || CONFIG.spreadsheetId;
                const sname = CONFIG.sheets[activeForm].sheetName;

                let url, method;
                if (isAddingNewRow) {
                    url = `https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/${sname}!A:A:append?valueInputOption=USER_ENTERED`;
                    method = "POST";
                } else {
                    // Xác định cột cuối cùng dựa trên số lượng header
                    const colLetter = getColLetter(rawHeaders.length);
                    const range = `${sname}!A${editingRowIndex + 1}:${colLetter}${editingRowIndex + 1}`;
                    url = `https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/${range}?valueInputOption=USER_ENTERED`;
                    method = "PUT";
                }

                const response = await fetch(url, {
                    method: method,
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        values: [newData]
                    })
                });

                if (response.ok) {
                    if (isAddingNewRow) {
                        isAddingNewRow = false;
                        editingRowIndex = null;
                        await fetchData();
                    } else {
                        currentData[editingRowIndex] = newData;
                        try { localStorage.setItem('gs_cached_data', JSON.stringify(currentData)); } catch (e) { }
                        editingRowIndex = null;
                        filterAndSortData();
                    }
                } else {
                    const err = await response.json();
                    alert("Lỗi khi lưu: " + err.error.message);
                }
            } catch (err) {
                console.error("Save error:", err);
            } finally {
                setTimeout(() => { if (statusLabel) statusLabel.style.display = 'none'; }, 1000);
                isSaving = false;
            }
        }

        // --- ADD & DELETE ---
        function addRow() {
            if (isAddingNewRow || editingRowIndex !== null) {
                return alert("Vui lòng hoàn tất dòng đang sửa trước khi thêm dòng mới.");
            }

            const emptyRow = currentData[0].map(() => "");
            currentData.splice(1, 0, emptyRow);

            editingRowIndex = 1;
            isAddingNewRow = true;
            currentPage = 1;
            filterAndSortData();
        }

        async function clearRowData(absoluteIndex) {
            if (isAddingNewRow) return alert("Vui lòng hoàn tất hoặc hủy dòng đang thêm.");
            if (!confirm("Bạn có chắc chắn muốn xóa toàn bộ dữ liệu của dòng này không?")) return;

            const statusLabel = document.getElementById('saveStatus');
            try {
                statusLabel.textContent = "Đang xóa dữ liệu...";
                statusLabel.style.display = 'block';

                const token = await getAccessToken();
                const sid = localStorage.getItem('gs_id') || CONFIG.spreadsheetId;
                const sname = CONFIG.sheets[activeForm].sheetName;

                const range = `${sname}!A${absoluteIndex + 1}:Z${absoluteIndex + 1}`;
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/${range}:clear`;

                const response = await fetch(url, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    // Cập nhật dữ liệu cục bộ thành mảng rỗng (giữ nguyên số cột)
                    currentData[absoluteIndex] = currentData[0].map(() => "");
                    try { localStorage.setItem('gs_cached_data', JSON.stringify(currentData)); } catch (e) { }
                    filterAndSortData();
                } else {
                    const err = await response.json();
                    alert("Lỗi khi xóa dữ liệu: " + err.error.message);
                }
            } catch (err) {
                console.error("Clear error:", err);
            } finally {
                statusLabel.textContent = "Đang lưu thay đổi...";
                setTimeout(() => statusLabel.style.display = 'none', 1000);
            }
        }

        // --- SETTINGS ---
        function openSettings() {
            document.getElementById('inputSpreadsheetId').value = localStorage.getItem('gs_id') || CONFIG.spreadsheetId;
            document.getElementById('inputSheetName').value = CONFIG.sheets[activeForm].sheetName;
            document.getElementById('inputDisplayColumns').value = CONFIG.sheets[activeForm].displayColumns.join(', ');
            document.getElementById('settingsModal').style.display = 'flex';
        }

        function applySettings() {
            const id = document.getElementById('inputSpreadsheetId').value;
            const colsRaw = document.getElementById('inputDisplayColumns').value;

            localStorage.setItem('gs_id', id);
            localStorage.setItem('gs_cols', colsRaw);

            // Cập nhật cột theo form hiện tại
            CONFIG.sheets[activeForm].displayColumns = colsRaw.split(',').map(s => s.trim()).filter(s => s !== "");

            closeModal('settingsModal');
            fetchData();
        }

        function resetSettings() {
            if (confirm("Bạn có chắc muốn xóa cài đặt và dùng cấu hình mặc định?")) {
                localStorage.removeItem('gs_id');
                localStorage.removeItem('gs_cols');
                location.reload(); // Reload để nhận lại CONFIG mặc định
            }
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
            // Nếu đóng modal upload, xóa src để reset iframe
            if (id === 'imageUploadModal') {
                document.getElementById('imageUploadIframe').src = "";
            }
        }

        function openImageUploadModal() {
            const modal = document.getElementById('imageUploadModal');
            const iframe = document.getElementById('imageUploadIframe');
            iframe.src = "https://script.google.com/macros/s/AKfycbwrnjzSxh9gbejVto4bJgr-FeTPOodmmoi6ZWCDDVX634L-Z08HGEyPZVk1QFIQMqfP/exec";
            modal.style.display = 'flex';
        }

        // --- UTILS ---
        function isImageUrl(url) {
            if (typeof url !== 'string') return false;
            const cleanUrl = url.trim().toLowerCase();
            return (cleanUrl.startsWith('http') &&
                (cleanUrl.match(/\.(jpeg|jpg|gif|png|webp|svg|avif)(\?.*)?$/) || cleanUrl.includes('googleusercontent.com')));
        }

        function zoomImage(url) {
            const overlay = document.getElementById('imageOverlay');
            const img = document.getElementById('overlayImage');
            img.src = url;
            overlay.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeImageOverlay() {
            const overlay = document.getElementById('imageOverlay');
            overlay.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // Chuyển số cột thành chữ cái (1 -> A, 27 -> AA)
        function getColLetter(n) {
            let letter = "";
            while (n > 0) {
                let temp = (n - 1) % 26;
                letter = String.fromCharCode(temp + 65) + letter;
                n = (n - temp - 1) / 26;
            }
            return letter || "A";
        }

        async function handleImageUpload(input, colIndex) {
            const file = input.files[0];
            if (!file) return;

            const apiKey = CONFIG.imgbbApiKey;
            if (!apiKey) {
                alert("Bạn chưa cấu hình imgbbApiKey trong code. Hãy đăng ký tài khoản tại imgbb.com để lấy API key.");
                return;
            }

            if (editingRowIndex === null) {
                isUploading = false;
                return;
            }
            isUploading = true; // Chặn saveData từ sự kiện blur

            const statusLabel = document.getElementById('saveStatus');
            statusLabel.textContent = "Đang tải ảnh lên ImgBB...";
            statusLabel.style.display = 'block';

            try {
                const formData = new FormData();
                formData.append('image', file);

                const response = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                if (result.success) {
                    const directUrl = result.data.url;

                    // Cập nhật giá trị vào DOM và dữ liệu cục bộ ngay lập tức
                    const targetInput = input.closest('div').querySelector('input[type="text"]');
                    if (targetInput) {
                        targetInput.value = directUrl;
                    }
                    // KHÔNG cập nhật currentData ở đây để saveData() thấy sự thay đổi so với cache

                    isUploading = false; // Mở khóa để saveData có thể chạy
                    await saveData(); // Gọi lưu ngay lập tức
                } else {
                    alert("Lỗi tải ảnh: " + (result.error ? result.error.message : "Thất bại"));
                    isUploading = false;
                }
            } catch (err) {
                console.error("Upload error:", err);
                alert("Lỗi kết nối khi tải ảnh. Kiểm tra Internet và API Key.");
                isUploading = false;
            } finally {
                statusLabel.style.display = 'none';
                input.value = "";
            }
        }

        function switchForm(formName, updateUrl = true) {
            if (!CONFIG.sheets[formName]) return;
            activeForm = formName;

            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-form-${formName}`).classList.add('active');

            document.getElementById('currentFormTitle').textContent = CONFIG.sheets[formName].title;

            if (updateUrl) {
                const url = new URL(window.location.href);
                url.searchParams.set('form', formName);
                window.history.replaceState({}, '', url.toString());
            }
            renderDynamicForm();
        }

        function copyCurrentFormLink() {
            const url = new URL(window.location.href);
            url.searchParams.set('form', activeForm);
            const idNv = getIdNvFromUrl();
            if (idNv) url.searchParams.set('id', idNv);
            navigator.clipboard.writeText(url.toString())
                .then(() => alert(`Đã copy link mở form ${activeForm}`))
                .catch(() => alert("Không thể copy link. Hãy copy thủ công trên thanh địa chỉ."));
        }

        function getIdNvFromUrl() {
            const params = new URLSearchParams(window.location.search);
            let idNv = params.get('id');

            // Hỗ trợ cả trường hợp link viết nhầm có 2 dấu '?'
            if (!idNv) {
                const match = window.location.href.match(/[?&]id=([^&#]+)/i);
                if (match && match[1]) idNv = decodeURIComponent(match[1]);
            }

            return idNv ? idNv.trim() : "";
        }

        function buildId(prefix) {
            const now = Date.now().toString().slice(-6);
            const rand = Math.floor(Math.random() * 900 + 100);
            return `${prefix}${now}${rand}`;
        }

        function renderDynamicForm() {
            const formConfig = CONFIG.sheets[activeForm];
            const wrap = document.getElementById('dynamicForm');
            const help = document.getElementById('currentFormHelp');
            const idNv = getIdNvFromUrl();
            wrap.innerHTML = '';

            formConfig.displayColumns
                .filter(col => col.toLowerCase() !== 'id' && col.toLowerCase() !== 'id_nv')
                .forEach(col => {
                    const required = formConfig.requiredFields.includes(col);
                    const group = document.createElement('div');
                    group.className = 'form-group';
                    group.innerHTML = `
                        <label>${col}${required ? ' *' : ''}</label>
                        <input type="text" data-field="${col}" ${required ? 'required' : ''} placeholder="Nhập ${col}">
                    `;
                    wrap.appendChild(group);
                });
        }

        function clearCurrentForm() {
            document.querySelectorAll('#dynamicForm input').forEach(input => input.value = '');
        }

        async function submitCurrentForm() {
            const formConfig = CONFIG.sheets[activeForm];
            const sid = localStorage.getItem('gs_id') || CONFIG.spreadsheetId;
            const sname = formConfig.sheetName;
            const idNv = getIdNvFromUrl();
            const statusWrap = document.getElementById('loading');
            const statusText = document.getElementById('loadingText');
            const inputMap = {};

            document.querySelectorAll('#dynamicForm input[data-field]').forEach(input => {
                inputMap[input.getAttribute('data-field')] = (input.value || '').trim();
            });

            const missing = formConfig.requiredFields.filter(field => !inputMap[field]);
            if (missing.length > 0) {
                alert(`Vui lòng nhập đầy đủ: ${missing.join(', ')}`);
                return;
            }

            const row = formConfig.displayColumns.map(col => {
                if (col.toLowerCase() === 'id') return buildId(formConfig.idPrefix);
                if (col.toLowerCase() === 'id_nv') return idNv;
                return inputMap[col] || '';
            });

            statusText.textContent = "Đang gửi dữ liệu...";
            statusWrap.style.display = 'block';

            try {
                const token = await getAccessToken();
                const encodedRange = encodeURIComponent(`${sname}!A:Z`);
                const appendUrl = `https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/${encodedRange}:append?valueInputOption=USER_ENTERED`;
                const response = await fetch(appendUrl, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ values: [row] })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err?.error?.message || "Không thể ghi dữ liệu vào Google Sheet.");
                }

                clearCurrentForm();
                alert("Gửi thông tin thành công!");
                // Gửi thông báo Telegram (không chặn luồng chính)
                sendTelegram(activeForm, row, formConfig.displayColumns).catch(e => console.warn('TG error:', e));
            } catch (err) {
                console.error("Submit form error:", err);
                alert("Gửi thất bại: " + err.message);
            } finally {
                statusWrap.style.display = 'none';
            }
        }

        // --- GỬI TELEGRAM ---
        async function sendTelegram(formName, row, columns) {
            const tg = CONFIG.telegram;
            if (!tg.botToken || tg.botToken.startsWith('THAY')) return; // Chưa cấu hình

            // Build nội dung tin nhắn
            const lines = [`📋 *Đăng ký mới – ${CONFIG.sheets[formName].title}*`, ''];
            columns.forEach((col, i) => {
                const val = row[i] !== undefined ? row[i] : '';
                if (col.toLowerCase() === 'id' || col.toLowerCase() === 'id_nv') return;
                if (val !== '') lines.push(`• *${col}:* ${val}`);
            });
            lines.push('');
            lines.push(`🕐 ${new Date().toLocaleString('vi-VN')}`);

            const text = lines.join('\n');
            await fetch(`https://api.telegram.org/bot${tg.botToken}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: tg.chatId,
                    text: text,
                    parse_mode: 'Markdown'
                })
            });
        }

        // --- XÁC THỰC ID TỪ SHEET DS_NV ---
        let validNvData = null; // Lưu thông tin NV sau khi xác thực

        async function validateIdFromSheet(idNv) {
            const formArea = document.getElementById('form-area');
            const invalidMsg = document.getElementById('id-invalid-msg');
            const loadingEl = document.getElementById('loading');
            const loadingText = document.getElementById('loadingText');

            // Nếu không có id trong URL -> hiện form bình thường (chế độ tab)
            if (!idNv) {
                formArea.style.display = 'block';
                invalidMsg.style.display = 'none';
                return;
            }

            loadingText.textContent = "Đang xác thực...";
            loadingEl.style.display = 'block';
            try {
                const token = await getAccessToken();
                const sid = localStorage.getItem('gs_id') || CONFIG.spreadsheetId;
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/DS_NV!A:D`;
                const res = await fetch(url, { headers: { "Authorization": `Bearer ${token}` } });
                const data = await res.json();

                if (!data.values || data.values.length < 2) {
                    invalidMsg.innerHTML = 'Không đọc được danh sách nhân viên. Vui lòng thử lại sau.';
                    invalidMsg.style.display = 'block';
                    formArea.style.display = 'none';
                    return;
                }

                // Header: id, ho_ten, link, mô tả
                const headers = data.values[0].map(h => h.toString().trim().toLowerCase());
                const idIdx = headers.indexOf('id');
                const nameIdx = headers.indexOf('ho_ten');
                const moTaIdx = headers.indexOf('mô tả');

                const found = data.values.slice(1).find(row => {
                    const cellId = row[idIdx] ? row[idIdx].toString().trim() : '';
                    return cellId === idNv.trim();
                });

                if (found) {
                    validNvData = {
                        id: found[idIdx] || '',
                        ho_ten: found[nameIdx] || '',
                        mo_ta: found[moTaIdx] || ''
                    };
                    formArea.style.display = 'block';
                    invalidMsg.style.display = 'none';
                } else {
                    // ID không hợp lệ -> lấy mô tả dòng đầu tiên hoặc hiện thông báo chung
                    const moTaChung = data.values[1] && moTaIdx !== -1 ? (data.values[1][moTaIdx] || '') : '';
                    invalidMsg.innerHTML = moTaChung
                        ? `<strong>⚠️ Link không hợp lệ.</strong><br>${moTaChung}`
                        : '⚠️ Link đăng ký không hợp lệ hoặc đã hết hiệu lực. Vui lòng liên hệ nhân viên để được cấp link mới.';
                    invalidMsg.style.display = 'block';
                    formArea.style.display = 'none';
                }
            } catch (err) {
                console.error('validateId error:', err);
                invalidMsg.innerHTML = 'Lỗi kết nối. Vui lòng thử lại sau.';
                invalidMsg.style.display = 'block';
                formArea.style.display = 'none';
            } finally {
                loadingEl.style.display = 'none';
            }
        }

        async function fetchSheetRowsForDataMode(sheetName) {
            const token = await getAccessToken();
            const sid = localStorage.getItem('gs_id') || CONFIG.spreadsheetId;
            const encodedRange = encodeURIComponent(`${sheetName}!A:Z`);
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/${encodedRange}`;
            const res = await fetch(url, { headers: { "Authorization": `Bearer ${token}` } });
            const data = await res.json();
            return data.values || [];
        }

        function renderDataTable(containerId, rows, dataValue) {
            const container = document.getElementById(containerId);
            container.innerHTML = "";

            if (!rows || rows.length < 2) {
                container.innerHTML = `<div class="empty-list-note">Không có dữ liệu trong sheet.</div>`;
                return;
            }

            const headers = rows[0].map(h => (h || "").toString().trim());
            const idNvIdx = headers.findIndex(h => h.toLowerCase() === "id_nv");
            const normalizedDataValue = (dataValue || "").trim().toLowerCase();
            const isViewAll =
                normalizedDataValue === "adminsan" ||
                normalizedDataValue === "adminson";

            let bodyRows = rows.slice(1);
            if (!isViewAll && idNvIdx !== -1 && normalizedDataValue) {
                bodyRows = bodyRows.filter(row => {
                    const rowIdNv = (row[idNvIdx] || "").toString().trim().toLowerCase();
                    return rowIdNv === normalizedDataValue;
                });
            }

            if (bodyRows.length === 0) {
                container.innerHTML = `<div class="empty-list-note">Không có dữ liệu với id_nv = ${dataValue}.</div>`;
                return;
            }

            const tableWrap = document.createElement("div");
            tableWrap.className = "table-container";
            const table = document.createElement("table");

            const thead = document.createElement("thead");
            const trHead = document.createElement("tr");
            headers.forEach(h => {
                const th = document.createElement("th");
                th.textContent = h;
                trHead.appendChild(th);
            });
            thead.appendChild(trHead);

            const tbody = document.createElement("tbody");
            bodyRows.forEach(row => {
                const tr = document.createElement("tr");
                headers.forEach((_, i) => {
                    const td = document.createElement("td");
                    td.textContent = row[i] || "";
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });

            table.appendChild(thead);
            table.appendChild(tbody);
            tableWrap.appendChild(table);
            container.appendChild(tableWrap);
        }

        function switchDataTab(tabName) {
            document.querySelectorAll('.data-tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.data-tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById(`data-tab-btn-${tabName}`).classList.add('active');
            document.getElementById(`data-tab-${tabName}`).classList.add('active');
        }

        async function openDataMode(dataValue) {
            const loadingEl = document.getElementById('loading');
            const loadingText = document.getElementById('loadingText');
            const formArea = document.getElementById('form-area');
            const invalidMsg = document.getElementById('id-invalid-msg');
            const dataListMode = document.getElementById('dataListMode');
            const dataListHeader = document.getElementById('dataListHeader');

            document.getElementById('tabNav').style.display = 'none';
            formArea.style.display = 'none';
            invalidMsg.style.display = 'none';
            dataListMode.style.display = 'block';
            const normalizedDataValue = (dataValue || "").trim().toLowerCase();
            const isViewAll =
                normalizedDataValue === "adminson" ||
                normalizedDataValue === "adminson";
            dataListHeader.textContent = isViewAll
                ? "Danh sách full dữ liệu DK_CTV và DK_UNG_DUNG (admin mode)"
                : `Danh sách DK_CTV và DK_UNG_DUNG với id_nv = ${dataValue}`;

            loadingText.textContent = "Đang tải danh sách từ 2 sheet...";
            loadingEl.style.display = 'block';
            try {
                const [ctvRows, ungDungRows] = await Promise.all([
                    fetchSheetRowsForDataMode(CONFIG.sheets.DK_CTV.sheetName),
                    fetchSheetRowsForDataMode(CONFIG.sheets.DK_UNG_DUNG.sheetName)
                ]);
                renderDataTable('data-tab-DK_CTV', ctvRows, dataValue);
                renderDataTable('data-tab-DK_UNG_DUNG', ungDungRows, dataValue);
                switchDataTab('DK_CTV');
            } catch (err) {
                console.error('openDataMode error:', err);
                document.getElementById('data-tab-DK_CTV').innerHTML = `<div class="empty-list-note">Lỗi tải dữ liệu: ${err.message}</div>`;
                document.getElementById('data-tab-DK_UNG_DUNG').innerHTML = `<div class="empty-list-note">Lỗi tải dữ liệu: ${err.message}</div>`;
            } finally {
                loadingEl.style.display = 'none';
            }
        }

        // Khởi tạo
        window.onload = async () => {
            const params = new URLSearchParams(window.location.search);
            const formFromUrl = params.get('form');
            const idNv = params.get('id') || '';
            const dataParam = params.get('data') || '';

            if (dataParam) {
                await openDataMode(dataParam);
                return;
            }

            // 1. Không truyền form -> Trang trắng
            if (!formFromUrl) {
                document.body.innerHTML = '';
                document.body.style.background = '#ffffff';
                return;
            }

            // 2. Truyền form hợp lệ
            if (CONFIG.sheets[formFromUrl]) {
                // Ẩn tab navigation khi truy cập bằng link cụ thể
                document.getElementById('tabNav').style.display = 'none';
                // Ẩn form trước khi xác thực
                document.getElementById('form-area').style.display = 'none';

                switchForm(formFromUrl, false);
                await validateIdFromSheet(idNv);
            } else {
                // Form truyền vào không hợp lệ -> Trang trắng
                document.body.innerHTML = '';
                document.body.style.background = '#ffffff';
            }
        };
    </script>
